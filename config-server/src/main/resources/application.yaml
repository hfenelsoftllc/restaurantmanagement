server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: composite
  cloud:
    vault:
      # Disable the VaultHealthIndicator by default (local dev without Vault running).
      # Set VAULT_ENABLED=true in Docker where the vault container is present.
      enabled: ${VAULT_ENABLED:false}
    config:
      server:
        composite:
          - type: native
            search-locations: ${CONFIG_REPO_LOCATION:file:${user.dir}/../config-repo/}
          - type: vault
            host: ${SPRING_CLOUD_VAULT_HOST:localhost}
            port: ${SPRING_CLOUD_VAULT_PORT:8200}
            scheme: ${SPRING_CLOUD_VAULT_SCHEME:http}
            authentication: TOKEN
            token: ${SPRING_CLOUD_VAULT_TOKEN:${VAULT_ROOT_TOKEN:1234567890abcdef}}
            backend: secret
            default-context: application

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:always}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:${spring.profiles.default:local}}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,2s,5s
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: Config Server
    description: Centralized configuration server for restaurant management services

