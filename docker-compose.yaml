name: restaurantmanagement

services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - resto-net

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_resto_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - resto-net

  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN is required}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN is required}
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - resto-net

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: composite
      CONFIG_REPO_LOCATION: file:/config-repo
      VAULT_ENABLED: "true"
      SPRING_CLOUD_VAULT_HOST: vault
      SPRING_CLOUD_VAULT_PORT: 8200
      SPRING_CLOUD_VAULT_SCHEME: http
      SPRING_CLOUD_VAULT_TOKEN: ${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN is required}
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - resto-net

  discovery-service:
    build:
      context: ./discovery-service
    container_name: discovery-service
    restart: unless-stopped
    environment:
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - resto-net

  usermanagement:
    build:
      context: ./usermanagement
    container_name: usermanagement
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "false"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-auth_resto_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - resto-net

  restaurantlisting:
    build:
      context: ./restaurantlisting
    container_name: restaurantlisting
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "false"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: restaurant_db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      FOOD_CATALOGUE_BASE_URL: http://foodcatalogue:9093
      FOOD_CATALOGUE_USE_LOAD_BALANCED: "false"
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9091:9091"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      foodcatalogue:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - resto-net

  foodcatalogue:
    build:
      context: .
      dockerfile: ./foodcatalogue/Dockerfile
    container_name: foodcatalogue
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "false"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: foodcataloguedb
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9093:9093"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9093/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - resto-net

  # ============================================
  # Kafka Infrastructure
  # ============================================

  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: kafka-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-datalog:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -lc 'echo ls / | zookeeper-shell localhost:2181 | grep -q zookeeper'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - resto-net

  kafka-broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker
    restart: unless-stopped
    depends_on:
      kafka-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_COMPRESSION_TYPE: snappy
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server=localhost:9092 2>/dev/null | grep -q 'kafka-broker:9092' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - resto-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka-broker:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: kafka-zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - resto-net

  # ============================================
  # Apache Cassandra — Order Service datastore
  # ============================================

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: RestaurantCluster
      CASSANDRA_DATACENTER: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      # Tune JVM heap for development; raise in production
      JVM_OPTS: "-Xms512M -Xmx512M"
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      # cqlsh is available after Cassandra is fully initialised
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - resto-net

  # ============================================
  # Order Service (Kafka Producer + Cassandra)
  # ============================================

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    container_name: order-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "false"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      # Cassandra connection
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: order_keyspace
      CASSANDRA_DATACENTER: datacenter1
      # Kafka connection
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9096:9096"
    depends_on:
      cassandra:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9096/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - resto-net

  # ============================================
  # Internal Payment Service (Kafka Consumer)
  # ============================================

  payment-service-internal:
    build:
      context: .
      dockerfile: ./payment-service-internal/Dockerfile
    container_name: payment-service-internal
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "true"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP_ID: payment-service-internal-group
      ORDER_SERVICE_URL: http://order-service:9096
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9097:9097"
    depends_on:
      kafka-broker:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9097/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - resto-net

  # ============================================
  # External Payment Service (Kafka Consumer)
  # ============================================

  payment-service-external:
    build:
      context: .
      dockerfile: ./payment-service-external/Dockerfile
    container_name: payment-service-external
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      VAULT_ENABLED: "false"
      EUREKA_ENABLED: "true"
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP_ID: payment-service-external-group
      ORDER_SERVICE_URL: http://order-service:9096
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_placeholder}
      ACTUATOR_EXPOSED_ENDPOINTS: health,info,metrics,prometheus
    ports:
      - "9098:9098"
    depends_on:
      kafka-broker:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9098/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - resto-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9095:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      usermanagement:
        condition: service_healthy
      restaurantlisting:
        condition: service_healthy
      foodcatalogue:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service-internal:
        condition: service_healthy
      payment-service-external:
        condition: service_healthy
      alertmanager:
        condition: service_started
    networks:
      - resto-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9094:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - resto-net

  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - resto-net

  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - resto-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - resto-net

volumes:
  mysql-data:
  postgres-data:
  cassandra-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
  zookeeper-data:
  zookeeper-datalog:
  kafka-data:

networks:
  resto-net:
    driver: bridge
