global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: restaurantmanagement

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - config-server:8888
        labels:
          service: config-server
          tier: platform

  - job_name: spring-discovery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - discovery-service:8761
        labels:
          service: discovery-service
          tier: platform

  - job_name: spring-usermanagement
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - usermanagement:9090
        labels:
          service: usermanagement
          tier: business

  - job_name: spring-restaurantlisting
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - restaurantlisting:9091
        labels:
          service: restaurantlisting
          tier: business

  - job_name: spring-foodcatalogue
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - foodcatalogue:9093
        labels:
          service: foodcatalogue
          tier: business

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

