global:
  resolve_timeout: 5m

route:
  receiver: default-observability
  group_by: [alertname, application, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-observability

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
      - application

