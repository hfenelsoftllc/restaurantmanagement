spring:
  application:
    name: PAYMENT-SERVICE-INTERNAL

server:
  port: 9097

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: http://localhost:8761/eureka
    registry-fetch-interval-seconds: 10
  instance:
    lease-renewal-interval-in-seconds: 10

kafka:
  topic:
    orders: ORDERTOPIC
    responses: ORDER_PAYMENT_RESPONSES
    dlq: ORDER_EVENTS_DLQ

payment:
  processing:
    timeout-seconds: 30
    retry-attempts: 3
    retry-delay-ms: 1000

